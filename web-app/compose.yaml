services:
  neo4j:
    image: neo4j:latest
    container_name: ${NEO4J_CONTAINER_NAME:-law-kg-neo4j}
    restart: unless-stopped
    ports:
      - "${NEO4J_HTTP_PORT:-7474}:7474"
      - "${NEO4J_BOLT_PORT:-7687}:7687"
    environment:
      NEO4J_AUTH: "${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-change_this_password}"
      NEO4J_server_memory_heap_initial__size: 1g
      NEO4J_server_memory_heap_max__size: 2g
      NEO4J_PLUGINS: '["apoc"]'
    volumes:
      - ./infra/neo4j/data:/data
      - ./infra/neo4j/logs:/logs
      - ./infra/neo4j/plugins:/plugins
      - ./data/graph:/import

  elasticsearch:
    image: elasticsearch:8.11.0
    container_name: ${ES_CONTAINER_NAME:-law-kg-elasticsearch}
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
      - xpack.security.enabled=false
    ports:
      - "${ES_PORT:-9200}:9200"
      - "${ES_TRANSPORT_PORT:-9300}:9300"
    volumes:
      - ./infra/elasticsearch/data:/usr/share/elasticsearch/data
    mem_limit: 1g

  postgres:
    image: postgres:16-alpine
    container_name: ${POSTGRES_CONTAINER_NAME:-law-kg-postgres}
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-law_kg}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_this_password}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --locale=C"
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - ./infra/postgres/data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-law_kg}"]
      interval: 10s
      timeout: 5s
      retries: 5
